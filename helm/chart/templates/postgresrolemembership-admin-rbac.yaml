apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-postgresrolemembership-admin-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresrolememberships
  verbs:
  - '*'
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresrolememberships/status
  verbs:
  - get
