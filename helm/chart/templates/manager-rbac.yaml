apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.fullname" . }}-manager-role
  labels:
  {{- include "chart.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgres
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresdatabases
  - postgresrolememberships
  - postgresroles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresdatabases/finalizers
  - postgresrolememberships/finalizers
  - postgresroles/finalizers
  verbs:
  - update
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresdatabases/status
  - postgresrolememberships/status
  - postgresroles/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chart.fullname" . }}-manager-rolebinding
  labels:
  {{- include "chart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "chart.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "chart.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
