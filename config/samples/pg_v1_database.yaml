apiVersion: pg.onestein.nl/v1
kind: PostgresDatabase
metadata:
  labels:
    app.kubernetes.io/name: pg-resource-operator
    app.kubernetes.io/managed-by: kustomize
  name: database-sample
spec:
  postgresRef:
    name: postgres-sample
  name: database-sample
  # encoding: UTF8
  # template: template1
  owner: role-sample
  privileges:
    - role:
        name: postgres
      connect: true
      create: true
      temporary: true
    - role:
        secretKeyRef:
          name: role-sample
          key: role
      connect: true
      create: false  # Cannot create new schemas
      temporary: true
    - role: # All other roles
        name: public
      connect: false
      create: false
      temporary: false
