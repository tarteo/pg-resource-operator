# This rule is not used by the project pg-resource-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over pg.onestein.nl.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pg-resource-operator
    app.kubernetes.io/managed-by: kustomize
  name: postgresrolemembership-admin-role
rules:
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresrolememberships
  verbs:
  - '*'
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresrolememberships/status
  verbs:
  - get
