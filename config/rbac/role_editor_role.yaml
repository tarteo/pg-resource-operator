# permissions for end users to edit roles.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pg-resource-operator
    app.kubernetes.io/managed-by: kustomize
  name: role-editor-role
rules:
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresroles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pg.onestein.nl
  resources:
  - postgresroles/status
  verbs:
  - get
